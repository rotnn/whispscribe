name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── macOS (Apple Silicon) ────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm install

      - name: Download ffmpeg (macOS ARM64)
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg-mac.zip
          unzip -p /tmp/ffmpeg-mac.zip ffmpeg > src-tauri/resources/ffmpeg-macos-aarch64
          chmod +x src-tauri/resources/ffmpeg-macos-aarch64

      - name: Build
        run: npm run tauri build -- --config src-tauri/tauri.macos.conf.json

      - uses: actions/upload-artifact@v4
        with:
          name: WhispScribe-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg

  # ── Windows (x64) ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    env:
      WHISPER_NO_METAL: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cmake
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Install npm dependencies
        run: npm install

      - name: Download ffmpeg (Windows x64)
        run: |
          curl -L "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -o "$env:TEMP\ffmpeg-win.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg-win.zip" -DestinationPath "$env:TEMP\ffmpeg-win"
          Copy-Item `
            "$env:TEMP\ffmpeg-win\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" `
            -Destination "src-tauri\resources\ffmpeg-windows-x86_64.exe"

      - name: Build
        run: npm run tauri build -- --config src-tauri/tauri.windows.conf.json

      - uses: actions/upload-artifact@v4
        with:
          name: WhispScribe-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: WhispScribe-macOS
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: WhispScribe-Windows
          path: artifacts/windows

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create v0.1.0 \
            --title "WhispScribe v0.1.0" \
            --notes "First release of WhispScribe. Download the installer for your platform below." \
            artifacts/macos/*.dmg \
            artifacts/windows/*.exe
